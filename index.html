<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>TIC-TAC-TOE</title>
  </head>
  <body>
    <div class="main-container">
      <h1>TIC TAC TOE</h1>
      <div id="status">Player X's turn</div>
      <div class="container">
        <button class="cell" cellIndex="0"></button>
        <button class="cell" cellIndex="1"></button>
        <button class="cell" cellIndex="2"></button>
        <button class="cell" cellIndex="3"></button>
        <button class="cell" cellIndex="4"></button>
        <button class="cell" cellIndex="5"></button>
        <button class="cell" cellIndex="6"></button>
        <button class="cell" cellIndex="7"></button>
        <button class="cell" cellIndex="8"></button>
      </div>

      <button id="restart-button">Restart Game</button>
    </div>
    <div class="side-box">
      <div class="players">
        <label for="">Player one:</label>
        <input type="text" id="playerX" placeholder="Player X Name" />
        <label for="">Player two:</label>
        <input type="text" id="playerO" placeholder="Player O Name" />
        <button id="savePlayers">Save Players</button>
      </div>

      <h3>Game History</h3>
      <ul id="history"></ul>
    </div>  

    <script src="index.js"></script>
  </body>
</html>
